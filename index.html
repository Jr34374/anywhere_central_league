<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>AR_demo</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.7/aframe/build/aframe-ar.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(8, 13, 18, 0.78);
      --panel-strong: rgba(8, 13, 18, 0.92);
      --line: rgba(255, 255, 255, 0.16);
      --text: #f7fbff;
      --muted: #b8c3cc;
      --accent: #20d6a4;
      --warn: #ffca6b;
      --danger: #ff7f7f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #070b0f;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    #ar-root,
    .a-canvas,
    a-scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #hud {
      position: fixed;
      z-index: 20;
      inset: env(safe-area-inset-top) 0 auto 0;
      display: grid;
      gap: 6px;
      justify-items: start;
      padding: 10px;
      pointer-events: none;
    }

    .topbar {
      width: min(100%, 520px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    .topbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--warn);
      box-shadow: 0 0 0 4px rgba(255, 202, 107, 0.16);
    }

    .status-dot.ready {
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(32, 214, 164, 0.18);
    }

    .status-dot.error {
      background: var(--danger);
      box-shadow: 0 0 0 4px rgba(255, 127, 127, 0.16);
    }

    #status-text {
      min-width: 0;
      color: var(--text);
      font-size: 14px;
      line-height: 1.45;
    }

    #accuracy {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .distance-panel {
      width: fit-content;
      max-width: calc(100vw - 20px);
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      padding: 5px;
    }

    .distance-list {
      display: flex;
      flex-wrap: nowrap;
      gap: 5px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .distance-item {
      display: grid;
      grid-template-columns: 10px auto;
      align-items: center;
      gap: 5px;
      min-width: 66px;
      min-height: 28px;
      padding: 5px 7px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
    }

    .team-color {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.15);
    }

    .distance-value {
      color: var(--text);
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    #start-screen {
      position: fixed;
      z-index: 30;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(rgba(7, 11, 15, 0.72), rgba(7, 11, 15, 0.88)), #070b0f;
    }

    .start-panel {
      width: min(100%, 420px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-strong);
      padding: 20px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.32);
    }

    .app-title {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.2;
    }

    .app-copy {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    #start-button {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #04100c;
      font-weight: 800;
      cursor: pointer;
    }

    #start-button:disabled {
      cursor: progress;
      opacity: 0.72;
    }

    #error-message {
      margin-top: 12px;
      color: var(--danger);
      font-size: 13px;
      line-height: 1.6;
      min-height: 1.6em;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 560px) {
      #hud {
        padding: 8px;
      }

      .topbar {
        grid-template-columns: auto minmax(0, 1fr);
      }

      #accuracy {
        grid-column: 2;
      }

      .topbar {
        width: calc(100vw - 16px);
      }

      .distance-panel {
        max-width: calc(100vw - 16px);
      }
    }
  </style>
</head>
<body>
  <main id="ar-root" aria-label="AR表示領域"></main>

  <section id="hud" aria-live="polite">
    <div class="topbar">
      <span id="status-dot" class="status-dot" aria-hidden="true"></span>
      <div id="status-text">開始待ち</div>
      <div id="accuracy">GPS: --</div>
    </div>
    <div class="distance-panel">
      <ul id="distance-list" class="distance-list"></ul>
    </div>
  </section>

  <section id="start-screen">
    <div class="start-panel">
      <h1 class="app-title">AR_demo</h1>
      <p class="app-copy">カメラ、位置情報、デバイスの向きを許可すると、各球場の方角にARマーカーを表示します。</p>
      <button id="start-button" type="button">開始</button>
      <div id="error-message" role="alert"></div>
    </div>
  </section>

  <script>
    const stadiums = [
      { name: "バンテリンドーム ナゴヤ", lat: 35.1859, lon: 136.9474, color: "#2f62ff" },
      { name: "阪神甲子園球場", lat: 34.7213, lon: 135.3616, color: "#ffd400" },
      { name: "MAZDA Zoom-Zoom スタジアム広島", lat: 34.3919, lon: 132.4847, color: "#e32929" },
      { name: "明治神宮野球場", lat: 35.6744, lon: 139.7170, color: "#22b14c" },
      { name: "横浜スタジアム", lat: 35.4433, lon: 139.6401, color: "#35c7e8" },
      { name: "東京ドーム", lat: 35.7056, lon: 139.7519, color: "#ff8a1f" }
    ];

    const DIRECTION_MARKER_DISTANCE = 14;
    const DIRECTION_MARKER_HEIGHT = 0;
    const SPHERE_RADIUS = 0.38;
    const HEADING_SMOOTHING = 0.28;
    const MARKER_POSITION_SMOOTHING = 0.18;

    const appState = {
      currentPosition: null,
      heading: null,
      headingSourcePriority: 0,
      headingSourceUpdatedAt: 0,
      watchId: null,
      sceneStarted: false,
      headingWatchStarted: false,
      markerAnimationStarted: false,
      stadiumMarkers: new Map()
    };

    const elements = {
      arRoot: document.getElementById("ar-root"),
      startScreen: document.getElementById("start-screen"),
      startButton: document.getElementById("start-button"),
      errorMessage: document.getElementById("error-message"),
      statusDot: document.getElementById("status-dot"),
      statusText: document.getElementById("status-text"),
      accuracy: document.getElementById("accuracy"),
      distanceList: document.getElementById("distance-list")
    };

    renderDistanceList();

    elements.startButton.addEventListener("click", startApp);

    async function startApp() {
      elements.startButton.disabled = true;
      elements.errorMessage.textContent = "";
      setStatus("権限を確認中", "waiting");

      try {
        await ensureSecureContext();
        await requestOrientationPermission();
        await requestCameraPermission();
        startHeadingWatch();
        await requestFirstLocation();
        startLocationWatch();
        createArScene();
        elements.startScreen.classList.add("hidden");
        setStatus("AR起動中", "ready");
      } catch (error) {
        console.error(error);
        elements.startButton.disabled = false;
        const message = error && error.message ? error.message : "起動できませんでした。";
        elements.errorMessage.textContent = message;
        setStatus("起動エラー", "error");
      }
    }

    async function ensureSecureContext() {
      // カメラとGPSは、HTTPSまたはlocalhostなどの安全なオリジンでのみ利用できる。
      if (!window.isSecureContext) {
        throw new Error("HTTPSまたはlocalhostで開いてください。カメラと位置情報は安全な接続でのみ利用できます。");
      }
    }

    async function requestCameraPermission() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error("このブラウザはカメラ取得に対応していません。");
      }

      // ユーザー操作に続けてカメラ許可を求め、許可後はいったん停止する。
      // 実際のカメラ映像はAR.jsがシーン起動時に取得して背景へ描画する。
      const stream = await navigator.mediaDevices.getUserMedia({
        audio: false,
        video: { facingMode: { ideal: "environment" } }
      });
      stream.getTracks().forEach((track) => track.stop());
    }

    async function requestOrientationPermission() {
      // iOS SafariではDeviceOrientationEvent.requestPermission()がユーザー操作中に必要になる。
      if (
        typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function"
      ) {
        const result = await DeviceOrientationEvent.requestPermission();
        if (result !== "granted") {
          throw new Error("デバイスの向きの取得が許可されませんでした。");
        }
      }
    }

    function startHeadingWatch() {
      if (appState.headingWatchStarted) {
        return;
      }

      appState.headingWatchStarted = true;

      // スマートフォンのコンパス方位を取得し、カメラが向いている方角を更新する。
      // iOSはwebkitCompassHeading、Android Chromeなどはalphaを使う。
      const updateHeading = (event) => {
        const reading = getCompassHeading(event);
        if (reading === null) {
          return;
        }

        const now = performance.now();
        const currentSourceIsFresh = now - appState.headingSourceUpdatedAt < 1200;
        if (reading.priority < appState.headingSourcePriority && currentSourceIsFresh) {
          return;
        }

        appState.headingSourcePriority = reading.priority;
        appState.headingSourceUpdatedAt = now;
        appState.heading = smoothHeading(appState.heading, reading.value, HEADING_SMOOTHING);
        updateSensorText();
        updateDirectionalMarkers();
      };

      window.addEventListener("deviceorientationabsolute", updateHeading, true);
      window.addEventListener("deviceorientation", updateHeading, true);
    }

    function requestFirstLocation() {
      if (!navigator.geolocation) {
        return Promise.reject(new Error("このブラウザは位置情報に対応していません。"));
      }

      // 初回の現在地を取得し、距離表示をすぐ更新できる状態にする。
      return new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            updateCurrentPosition(position);
            resolve(position);
          },
          () => reject(new Error("位置情報が取得できませんでした。GPSの利用を許可してください。")),
          {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
          }
        );
      });
    }

    function startLocationWatch() {
      if (appState.watchId !== null) {
        return;
      }

      // GPSの変化を監視し、現在地から各球場までの距離を継続的に再計算する。
      appState.watchId = navigator.geolocation.watchPosition(
        updateCurrentPosition,
        (error) => {
          console.warn(error);
          setStatus("GPS更新待ち", "waiting");
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 3000
        }
      );
    }

    function updateCurrentPosition(position) {
      appState.currentPosition = {
        lat: position.coords.latitude,
        lon: position.coords.longitude,
        accuracy: position.coords.accuracy
      };

      updateSensorText();
      setStatus("現在地を取得中", "ready");
      renderDistanceList();
      updateDirectionalMarkers();
    }

    function createArScene() {
      if (appState.sceneStarted) {
        return;
      }

      appState.sceneStarted = true;
      const scene = document.createElement("a-scene");
      scene.setAttribute("embedded", "");
      scene.setAttribute("renderer", "logarithmicDepthBuffer: true; antialias: true; alpha: true");
      scene.setAttribute("vr-mode-ui", "enabled: false");
      scene.setAttribute("device-orientation-permission-ui", "enabled: false");
      scene.setAttribute("arjs", "sourceType: webcam; videoTexture: true; debugUIEnabled: false;");

      // カメラ映像はAR.jsが背景に描画する。球体の位置は下の方位角計算で手動更新する。
      const camera = document.createElement("a-camera");
      camera.setAttribute("id", "ar-camera");
      camera.setAttribute("camera", "near: 0.1; far: 1000");
      camera.setAttribute("look-controls", "enabled: false");
      camera.setAttribute("wasd-controls", "enabled: false");
      camera.setAttribute("position", "0 0 0");
      scene.appendChild(camera);

      const light = document.createElement("a-entity");
      light.setAttribute("light", "type: ambient; color: #ffffff; intensity: 1");
      scene.appendChild(light);

      stadiums.forEach((stadium) => {
        const marker = createStadiumEntity(stadium);
        appState.stadiumMarkers.set(stadium.name, marker);
        scene.appendChild(marker);
      });

      elements.arRoot.appendChild(scene);
      startMarkerAnimationLoop();
      updateDirectionalMarkers();
    }

    function createStadiumEntity(stadium) {
      const marker = document.createElement("a-entity");
      marker.setAttribute("visible", "false");

      const sphere = document.createElement("a-sphere");
      sphere.setAttribute("radius", String(SPHERE_RADIUS));
      sphere.setAttribute("segments-width", "32");
      sphere.setAttribute("segments-height", "16");
      sphere.setAttribute("material", `color: ${stadium.color}; emissive: ${stadium.color}; emissiveIntensity: 0.2; roughness: 0.25; transparent: true; opacity: 0.96; depthTest: false; depthWrite: false`);

      marker.appendChild(sphere);
      return marker;
    }

    function updateDirectionalMarkers() {
      if (!appState.sceneStarted || !appState.currentPosition || appState.heading === null) {
        appState.stadiumMarkers.forEach((marker) => {
          marker.object3D.visible = false;
          marker.object3D.userData.targetPosition = null;
          marker.object3D.userData.positionReady = false;
        });
        return;
      }

      stadiums.forEach((stadium) => {
        const marker = appState.stadiumMarkers.get(stadium.name);
        if (!marker) {
          return;
        }

        // 現在地から球場への方位角と、スマホカメラが向いている方位角の差を求める。
        // 差が0度なら画面中央の前方、90度なら右、180度なら背面に球体を置く。
        const stadiumBearing = getBearingDegrees(
          appState.currentPosition.lat,
          appState.currentPosition.lon,
          stadium.lat,
          stadium.lon
        );
        const relativeBearing = normalizeDegrees(stadiumBearing - appState.heading);
        const radians = toRadians(relativeBearing);
        const x = Math.sin(radians) * DIRECTION_MARKER_DISTANCE;
        const z = -Math.cos(radians) * DIRECTION_MARKER_DISTANCE;

        marker.object3D.userData.targetPosition = {
          x,
          y: DIRECTION_MARKER_HEIGHT,
          z
        };

        if (!marker.object3D.userData.positionReady) {
          marker.object3D.position.set(x, DIRECTION_MARKER_HEIGHT, z);
          marker.object3D.userData.positionReady = true;
        }

        marker.object3D.visible = true;
      });
    }

    function startMarkerAnimationLoop() {
      if (appState.markerAnimationStarted) {
        return;
      }

      appState.markerAnimationStarted = true;

      const animate = () => {
        appState.stadiumMarkers.forEach((marker) => {
          const target = marker.object3D.userData.targetPosition;
          if (!target || !marker.object3D.visible) {
            return;
          }

          // 方位センサーの値は細かく揺れやすいので、描画フレームごとに位置を補間してチラつきを抑える。
          marker.object3D.position.x += (target.x - marker.object3D.position.x) * MARKER_POSITION_SMOOTHING;
          marker.object3D.position.y += (target.y - marker.object3D.position.y) * MARKER_POSITION_SMOOTHING;
          marker.object3D.position.z += (target.z - marker.object3D.position.z) * MARKER_POSITION_SMOOTHING;
        });

        requestAnimationFrame(animate);
      };

      requestAnimationFrame(animate);
    }

    function renderDistanceList() {
      const rows = stadiums
        .map((stadium) => {
          const distance = appState.currentPosition
            ? getDistanceMeters(appState.currentPosition.lat, appState.currentPosition.lon, stadium.lat, stadium.lon)
            : null;
          return { ...stadium, distance };
        })
        .sort((a, b) => {
          if (a.distance === null || b.distance === null) {
            return 0;
          }
          return a.distance - b.distance;
        });

      elements.distanceList.innerHTML = "";
      rows.forEach((stadium) => {
        const distanceText = formatDistance(stadium.distance);
        const item = document.createElement("li");
        item.className = "distance-item";
        item.title = `${stadium.name}: ${distanceText}`;
        item.setAttribute("aria-label", `${stadium.name}: ${distanceText}`);
        item.innerHTML = `
          <span class="team-color" style="background:${stadium.color}"></span>
          <span class="distance-value">${distanceText}</span>
        `;
        elements.distanceList.appendChild(item);
      });
    }

    function getDistanceMeters(lat1, lon1, lat2, lon2) {
      // haversine式で地球表面上の2点間距離を計算する。
      const earthRadius = 6371008.8;
      const phi1 = toRadians(lat1);
      const phi2 = toRadians(lat2);
      const deltaPhi = toRadians(lat2 - lat1);
      const deltaLambda = toRadians(lon2 - lon1);
      const a =
        Math.sin(deltaPhi / 2) * Math.sin(deltaPhi / 2) +
        Math.cos(phi1) * Math.cos(phi2) *
        Math.sin(deltaLambda / 2) * Math.sin(deltaLambda / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return earthRadius * c;
    }

    function getBearingDegrees(lat1, lon1, lat2, lon2) {
      // 現在地から目的地への初期方位角を計算する。0度が北、90度が東。
      const phi1 = toRadians(lat1);
      const phi2 = toRadians(lat2);
      const deltaLambda = toRadians(lon2 - lon1);
      const y = Math.sin(deltaLambda) * Math.cos(phi2);
      const x =
        Math.cos(phi1) * Math.sin(phi2) -
        Math.sin(phi1) * Math.cos(phi2) * Math.cos(deltaLambda);
      return normalizeDegrees(Math.atan2(y, x) * 180 / Math.PI);
    }

    function getCompassHeading(event) {
      if (typeof event.webkitCompassHeading === "number") {
        return {
          value: normalizeDegrees(event.webkitCompassHeading),
          priority: 3
        };
      }

      if (event.absolute === true && typeof event.alpha === "number") {
        return {
          value: normalizeDegrees(360 - event.alpha),
          priority: 2
        };
      }

      if (typeof event.alpha === "number") {
        return {
          value: normalizeDegrees(360 - event.alpha),
          priority: 1
        };
      }

      return null;
    }

    function smoothHeading(previousHeading, nextHeading, amount) {
      if (previousHeading === null) {
        return nextHeading;
      }

      // 359度から0度へまたぐ場合も短い方向へ補間する。
      const delta = normalizeDegrees(nextHeading - previousHeading + 180) - 180;
      return normalizeDegrees(previousHeading + delta * amount);
    }

    function updateSensorText() {
      const gpsText = appState.currentPosition
        ? `GPS: ±${Math.round(appState.currentPosition.accuracy)}m`
        : "GPS: --";
      const headingText = appState.heading === null
        ? "方位: --"
        : `方位: ${Math.round(appState.heading)}°`;

      elements.accuracy.textContent = `${gpsText} / ${headingText}`;
    }

    function normalizeDegrees(degrees) {
      return (degrees % 360 + 360) % 360;
    }

    function toRadians(degrees) {
      return degrees * Math.PI / 180;
    }

    function formatDistance(distance) {
      if (distance === null) {
        return "--";
      }

      if (distance < 1000) {
        return `${Math.round(distance)} m`;
      }

      return `${(distance / 1000).toFixed(distance < 100000 ? 1 : 0)} km`;
    }

    function setStatus(text, state) {
      elements.statusText.textContent = text;
      elements.statusDot.classList.toggle("ready", state === "ready");
      elements.statusDot.classList.toggle("error", state === "error");
    }
  </script>
</body>
</html>
